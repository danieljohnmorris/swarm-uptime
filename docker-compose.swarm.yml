version: "3.8"

services:
  traefik:
    image: traefik:v3.3
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    deploy:
      placement:
        constraints:
          - node.role == manager

  api:
    image: ${REGISTRY}/swarm-uptime-api:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
    depends_on:
      - postgres
      - valkey
    deploy:
      replicas: 2
      labels:
        - traefik.enable=true
        - traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)
        - traefik.http.routers.api.entrypoints=websecure
        - traefik.http.routers.api.tls.certresolver=le
        - traefik.http.services.api.loadbalancer.server.port=3001
      restart_policy:
        condition: on-failure

  worker:
    image: ${REGISTRY}/swarm-uptime-worker:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
    depends_on:
      - postgres
      - valkey
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  web:
    image: ${REGISTRY}/swarm-uptime-web:latest
    environment:
      API_URL: http://api:3001
    depends_on:
      - api
    deploy:
      replicas: 2
      labels:
        - traefik.enable=true
        - traefik.http.routers.web.rule=Host(`${STATUS_DOMAIN}`)
        - traefik.http.routers.web.entrypoints=websecure
        - traefik.http.routers.web.tls.certresolver=le
        - traefik.http.services.web.loadbalancer.server.port=4321
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      placement:
        constraints:
          - node.role == manager

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkeydata:/data
    deploy:
      placement:
        constraints:
          - node.role == manager

volumes:
  pgdata:
  valkeydata:
  letsencrypt:
